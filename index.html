<!DOCTYPE html>
<html>
<head>
<title>Fuel Rescue</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<h1>Fuel Rescue 🚗⛽</h1>
<p>Emergency fuel and vehicle assistance platform.</p>

<h2>Request Help</h2>

<form>
<label>Name:</label><br>
<input type="text" placeholder="Enter your name"><br><br>

<label>Vehicle Type:</label><br>
<input type="text" placeholder="Bike / Car"><br><br>

<label>Location:</label><br>
<input type="text" placeholder="Enter your location"><br><br>

<label>Service Needed:</label><br>
<select>
<option>Fuel Delivery</option>
<option>Mechanic</option>
<option>Tyre Repair</option>
<option>Towing</option>
</select><br><br>

<button type="submit">Send Request</button>
<button onclick="getLocation()">Detect My Location</button>
<h2>Vehicle Location</h2>
<div id="map" style="height:400px; width:80%; margin:auto;"></div>
<button onclick="getLocation()">Detect My Location</button>
<h2>Request Fuel Delivery</h2>

<form id="fuelForm">
<label>Name:</label><br>
<input type="text" id="name" required><br><br>

<label>Phone Number:</label><br>
<input type="tel" id="phone" required><br><br>

<label>Fuel Type:</label><br>
<select id="fuelType">
<option>Petrol</option>
<option>Diesel</option>
</select><br><br>

<label>Fuel Amount (Litres):</label><br>
<input type="number" id="amount" required><br><br>

<button type="submit">Send Request</button>
</form>

<p id="message"></p>
</form>

<script src="script.js"></script>

</body>
</html>
